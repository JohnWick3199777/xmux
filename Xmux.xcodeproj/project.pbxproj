			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "set -e\nRESOURCES_DIR=\"${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}\"\n# Copy shell integration so ghostty can inject into bash/zsh/fish\nif [ -d \"${SRCROOT}/Resources/ghostty/shell-integration\" ]; then\n  mkdir -p \"$RESOURCES_DIR/ghostty\"\n  cp -R \"${SRCROOT}/Resources/ghostty/shell-integration\" \"$RESOURCES_DIR/ghostty/\"\nfi\n# Copy terminfo — the sentinel file that tells libghostty where resources live\nif [ -d \"${SRCROOT}/Resources/terminfo\" ]; then\n  cp -R \"${SRCROOT}/Resources/terminfo\" \"$RESOURCES_DIR/\"\nfi\n# Copy xmux-specific launchers, hook config, and shell integration layers.\n# Remove the old destination first so deleted files don't linger in the app bundle.\nif [ -d \"${SRCROOT}/Resources/xmux\" ]; then\n  rm -rf \"$RESOURCES_DIR/xmux\"\n  cp -R \"${SRCROOT}/Resources/xmux\" \"$RESOURCES_DIR/\"\n  find \"$RESOURCES_DIR/xmux/bin\" -type f -exec chmod +x {} \\; 2>/dev/null || true\n  find \"$RESOURCES_DIR/xmux/shell-integration\" -type f -exec chmod +r {} \\; 2>/dev/null || true\nfi\n";
		};
